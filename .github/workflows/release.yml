# .github/workflows/release.yml
name: Build & Release

on:
  push:
    tags:
      - 'v*'

# Explicit permission required to create GitHub Releases
permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Decode keystore into android/app/ ─────────────────────────────────
      # Gradle resolves storeFile relative to the app module (android/app/).
      # Placing the .jks there means storeFile = "stranger_release.jks" works.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n' | base64 -d > android/app/stranger_release.jks
          if [ ! -s android/app/stranger_release.jks ]; then
            echo "ERROR: Keystore is empty — check KEYSTORE_BASE64 secret"
            exit 1
          fi
          echo "Keystore decoded: $(wc -c < android/app/stranger_release.jks) bytes"

      # ── Write key.properties so Gradle picks up signing config ────────────
      # Using key.properties avoids the file() path resolution ambiguity
      # that occurs when passing storeFile via environment variables.
      - name: Write key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=stranger_release.jks
          EOF

      # ── Build signed APKs ─────────────────────────────────────────────────
      - name: Build release APKs (split by ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      # ── Rename ────────────────────────────────────────────────────────────
      - name: Rename APKs with version tag
        run: |
          TAG="${{ github.ref_name }}"
          cd build/app/outputs/flutter-apk/
          mv app-arm64-v8a-release.apk   STRANGER-${TAG}-arm64.apk     2>/dev/null || true
          mv app-armeabi-v7a-release.apk STRANGER-${TAG}-arm32.apk     2>/dev/null || true
          mv app-x86_64-release.apk      STRANGER-${TAG}-x86_64.apk    2>/dev/null || true
          mv app-release.apk             STRANGER-${TAG}-universal.apk 2>/dev/null || true

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "STRANGER ${{ github.ref_name }}"
          body: |
            ## STRANGER ${{ github.ref_name }}

            Offline P2P anonymous chat — no internet, no accounts, end-to-end encrypted.

            ### 📦 Download
            | APK | Device |
            |-----|--------|
            | `STRANGER-${{ github.ref_name }}-arm64.apk` | Most modern Android phones ✅ recommended |
            | `STRANGER-${{ github.ref_name }}-arm32.apk` | Older 32-bit Android devices |
            | `STRANGER-${{ github.ref_name }}-x86_64.apk` | Intel/AMD Android, some emulators |
            | `STRANGER-${{ github.ref_name }}-universal.apk` | All devices (larger file) |

            ### ⚠️ Installation
            Enable **Install unknown apps** in Android Settings before installing.

            ### 🔐 Permissions required
            - Bluetooth — peer discovery via BLE
            - Location — Android BLE scanning prerequisite
            - Nearby Devices — WiFi Direct data transfer

          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/STRANGER-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}