# .github/workflows/release.yml
#
# Triggered when you push a version tag: git tag v1.0.0 && git push --tags
# Builds a signed release APK and creates a GitHub Release with it attached.

name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3, etc.

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Flutter ─────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Decode keystore ──────────────────────────────────────────────────
      # tr -d '\n' strips newlines that macOS base64 inserts every 76 chars.
      # base64 -d is the GNU/Linux flag on the Ubuntu runner.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n' | base64 -d > android/stranger_release.jks
          if [ ! -s android/stranger_release.jks ]; then
            echo "ERROR: Keystore is empty — check KEYSTORE_BASE64 secret"
            exit 1
          fi
          echo "Keystore decoded: $(wc -c < android/stranger_release.jks) bytes"

      # ── Build signed APKs ────────────────────────────────────────────────
      - name: Build release APKs (split by ABI)
        env:
          KEYSTORE_PATH:     android/stranger_release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        env:
          KEYSTORE_PATH:     android/stranger_release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      # ── Rename APKs ───────────────────────────────────────────────────────
      - name: Rename APKs with version tag
        run: |
          TAG="${{ github.ref_name }}"
          cd build/app/outputs/flutter-apk/
          mv app-arm64-v8a-release.apk   STRANGER-${TAG}-arm64.apk     2>/dev/null || true
          mv app-armeabi-v7a-release.apk STRANGER-${TAG}-arm32.apk     2>/dev/null || true
          mv app-x86_64-release.apk      STRANGER-${TAG}-x86_64.apk    2>/dev/null || true
          mv app-release.apk             STRANGER-${TAG}-universal.apk 2>/dev/null || true

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "STRANGER ${{ github.ref_name }}"
          body: |
            ## STRANGER ${{ github.ref_name }}

            Offline P2P anonymous chat — no internet, no accounts, end-to-end encrypted.

            ### 📦 Download
            | APK | Device |
            |-----|--------|
            | `STRANGER-${{ github.ref_name }}-arm64.apk` | Most modern Android phones ✅ recommended |
            | `STRANGER-${{ github.ref_name }}-arm32.apk` | Older 32-bit Android devices |
            | `STRANGER-${{ github.ref_name }}-x86_64.apk` | Intel/AMD Android, some emulators |
            | `STRANGER-${{ github.ref_name }}-universal.apk` | All devices (larger file) |

            ### ⚠️ Installation
            Enable **Install unknown apps** in Android Settings before installing.

            ### 🔐 Permissions required
            - Bluetooth — peer discovery
            - Location — Android BLE scanning prerequisite
            - Nearby Devices — WiFi Direct data transfer

          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/STRANGER-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}